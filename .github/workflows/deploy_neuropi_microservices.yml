# =============================================================================
# NeuroPi Microservices — Azure App Service CI/CD Pipeline
# Services: NeuroPiTenant (UserManagement), NeuroPIUserManagement, NeuroPISchoolManagement
# Runtime:  .NET 8  |  Linux App Service Plan (F1 - Free tier)
# Region:   Central India
# =============================================================================

name: Deploy NeuroPi Microservices to Azure

on:
  push:
    branches:
      - master
  workflow_dispatch:         # allows manual trigger from GitHub UI

# ---------------------------------------------------------------------------
# Define all 3 services in one place — matrix picks these up automatically
# ---------------------------------------------------------------------------
env:
  AZURE_RESOURCE_GROUP: neuropi-rg
  DOTNET_VERSION: '8.x'

jobs:
  # ===========================================================================
  # JOB 1 — BUILD & PUBLISH (matrix: runs 3 times in parallel)
  # ===========================================================================
  build:
    name: Build — ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write   # required for artifact deletion

    strategy:
      fail-fast: false   # let other services continue even if one fails
      matrix:
        service:
          # ── Tenant / User Management API ──────────────────────────────────
          - name: neuropi-user-api
            project: NeuroPi/NeuroPi.UserManagment.csproj
            artifact: neuropi-user-api-artifact
            dll: NeuroPi.UserManagment.dll

          # ── School Management API ──────────────────────────────────────────
          - name: neuropi-school-api
            project: SchoolManagement/SchoolManagement.csproj
            artifact: neuropi-school-api-artifact
            dll: SchoolManagement.dll

          # ── NeuroPi Forms / Tenant API ─────────────────────────────────────
          - name: neuropi-tenant-api
            project: NeuropiForms/NeuropiForms.csproj
            artifact: neuropi-tenant-api-artifact
            dll: NeuropiForms.dll

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET SDK ─────────────────────────────────────────────────────────────
      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── NuGet Cache (speeds up builds significantly) ─────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.service.name }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.service.name }}-
            nuget-${{ runner.os }}-

      # ── Restore ──────────────────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore ${{ matrix.service.project }}

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: dotnet build ${{ matrix.service.project }} --configuration Release --no-restore

      # ── Delete old artifacts to keep storage clean ───────────────────────────
      - name: Delete old GitHub artifacts
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting old artifacts named: ${{ matrix.service.artifact }}"
          gh api repos/${{ github.repository }}/actions/artifacts \
            --paginate \
            --jq '.artifacts[] | select(.name == "${{ matrix.service.artifact }}") | select(.expired == false) | .id' \
          | xargs -I{} gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/{}
          echo "Old artifact cleanup complete."

      # ── Publish ──────────────────────────────────────────────────────────────
      - name: Publish ${{ matrix.service.name }}
        run: |
          dotnet publish ${{ matrix.service.project }} \
            --configuration Release \
            --output ./publish/${{ matrix.service.name }} \
            --no-build

      # ── Zip Published Output ──────────────────────────────────────────────────
      - name: Create deployment ZIP
        run: |
          cd ./publish/${{ matrix.service.name }}
          zip -r ../../${{ matrix.service.name }}.zip .
          cd ../..
          echo "ZIP created at ${{ matrix.service.name }}.zip"

      # ── Upload Artifact (1 day retention to save space) ──────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.artifact }}
          path: ${{ matrix.service.name }}.zip
          retention-days: 1

      # ── Clean up local publish output ─────────────────────────────────────────
      - name: Clean up publish directory
        if: always()
        run: |
          rm -rf ./publish/${{ matrix.service.name }}
          rm -f ./${{ matrix.service.name }}.zip
          echo "Local build artifacts cleaned."

  # ===========================================================================
  # JOB 2 — DEPLOY (matrix: runs 3 times, each after its build job)
  # ===========================================================================
  deploy:
    name: Deploy — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write   # required for OIDC / azure/login
      contents: read

    environment:
      name: production   # ties to GitHub Environments (create in repo settings)

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: neuropi-user-api
            artifact: neuropi-user-api-artifact
            app_service: neuropi-user-api
            dll: NeuroPi.UserManagment.dll
            startup_cmd: dotnet NeuroPi.UserManagment.dll

          - name: neuropi-school-api
            artifact: neuropi-school-api-artifact
            app_service: neuropi-school-api
            dll: SchoolManagement.dll
            startup_cmd: dotnet SchoolManagement.dll

          - name: neuropi-tenant-api
            artifact: neuropi-tenant-api-artifact
            app_service: neuropi-tenant-api
            dll: NeuropiForms.dll
            startup_cmd: dotnet NeuropiForms.dll

    steps:
      # ── Download the artifact published in the build job ─────────────────────
      - name: Download artifact — ${{ matrix.service.name }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service.artifact }}
          path: ./downloaded

      # ── Login to Azure using Service Principal (JSON credentials) ────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Configure App Settings before deploy ─────────────────────────────────
      - name: Set Azure App Service configuration
        run: |
          az webapp config appsettings set \
            --name ${{ matrix.service.app_service }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings \
              ASPNETCORE_ENVIRONMENT=Development \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              WEBSITES_PORT=8080
          echo "App settings configured."

      # ── Set startup command so Azure knows which DLL to run ──────────────────
      - name: Set startup command
        run: |
          az webapp config set \
            --name ${{ matrix.service.app_service }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --startup-file "${{ matrix.service.startup_cmd }}"
          echo "Startup command set to: ${{ matrix.service.startup_cmd }}"

      # ── Deploy via ZIP Deploy ─────────────────────────────────────────────────
      - name: Deploy ${{ matrix.service.name }} to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.service.app_service }}
          package: ./downloaded/${{ matrix.service.name }}.zip

      # ── Restart to pick up changes ────────────────────────────────────────────
      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ matrix.service.app_service }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
          echo "${{ matrix.service.app_service }} restarted."

      # ── Verify deployment (smoke test) ───────────────────────────────────────
      - name: Smoke test — check Swagger UI
        continue-on-error: true
        run: |
          echo "Waiting 30s for app to warm up (F1 cold start)..."
          sleep 30
          URL="https://${{ matrix.service.app_service }}.azurewebsites.net/swagger/index.html"
          echo "Testing: $URL"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Swagger is UP for ${{ matrix.service.name }}"
          else
            echo "⚠️  Swagger returned $HTTP_STATUS — may still be warming up (F1 cold start is expected)"
          fi

      # ── Clean up downloaded artifact ──────────────────────────────────────────
      - name: Clean up downloaded ZIP
        if: always()
        run: |
          rm -rf ./downloaded
          echo "Downloaded artifacts cleaned up."
